name: Bug report
description: Report a reproducible problem in quant-qmt.
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve quant-qmt. Please share enough detail for us to reproduce the issue.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and whether this is a gateway host or client machine.
      placeholder: Windows 11, Python 3.11, gateway host
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or API call
      description: Paste the CLI command, Python snippet, or HTTP request that triggered the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove account identifiers, order ids, and any other sensitive trading information before posting.
